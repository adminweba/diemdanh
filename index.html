<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Điểm Danh</title>
    <link rel="icon" href="logo.png?v=2" type="image/png" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --p: #4361ee;
            --s: #10b981;
            --w: #f59e0b;
            --bg: #f3f4f6;
            --d: #1f2937;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            user-select: none;
        }

        body {
            background: var(--bg);
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
        }

        .container {
            background: white;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 380px 1fr 320px;
        }

        .column {
            height: 100vh;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #e5e7eb;
            overflow: hidden;
        }

        .side-p {
            padding: 20px;
        }

        .form-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow: hidden;
        }

        .status-box {
            background: #f1f5ff;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-weight: 700;
            color: var(--p);
            border: 1px solid #dbeafe;
            font-size: 13px;
            margin-bottom: 5px;
        }

        label {
            font-size: 11px;
            font-weight: 700;
            color: #4b5563;
            text-transform: uppercase;
            margin-bottom: 2px;
            display: block;
        }

        select,
        input,
        textarea {
            padding: 10px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            width: 100%;
        }

        textarea {
            height: 90px;
            resize: none;
            overflow-y: auto;
        }

        .proof-section {
            display: flex;
            flex-direction: column;
            gap: 5px;
            overflow: hidden;
            max-height: 180px;
        }

        .proof-scroll {
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding-right: 5px;
            flex: 1;
        }

        .proof-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .proof-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .proof-item {
            display: flex;
            gap: 5px;
            flex-shrink: 0;
        }

        .btn-del {
            background: #fee2e2;
            color: #ef4444;
            border: none;
            padding: 0 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-add-link {
            padding: 8px;
            font-size: 11px;
            cursor: pointer;
            background: white;
            border: 1px dashed var(--p);
            color: var(--p);
            border-radius: 8px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .shift-btn {
            padding: 8px;
            font-size: 11px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            font-weight: 600;
        }

        .shift-btn.active {
            background: var(--p);
            color: white;
            border-color: var(--p);
        }

        .btn-group {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-top: 10px;
        }

        .btn {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            border-bottom: 4px solid rgba(0, 0, 0, 0.2);
        }

        .btn-in {
            background: var(--s);
            color: white;
        }

        .btn-out {
            background: var(--w);
            color: white;
        }

        .btn-copy {
            background: var(--d);
            color: white;
        }

        .btn:active {
            transform: translateY(2px);
            border-bottom-width: 1px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .active-mode {
            outline: 4px solid #000;
        }

        .output-side {
            background: #111827;
            padding: 25px;
            overflow-y: auto;
            position: relative;
        }

        #preview {
            white-space: pre-wrap;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            color: #e5e7eb;
            line-height: 1.6;
        }

        /* Custom UI Elements */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20000;
            color: white;
            backdrop-filter: blur(5px);
        }

        #toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            display: none;
            z-index: 100001;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                bottom: -50px;
                opacity: 0;
            }

            to {
                bottom: 25px;
                opacity: 1;
            }
        }

        .admin-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            backdrop-filter: blur(8px);
        }

        .admin-card {
            background: #1f2937;
            color: white;
            width: 450px;
            padding: 25px;
            border-radius: 20px;
            border: 1px solid #374151;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .admin-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #111827;
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid #374151;
        }

        .btn-adm {
            padding: 6px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
        }

        .btn-minus {
            background: #374151;
            color: #fbbf24;
            margin-right: 5px;
        }

        .btn-del-user {
            background: #450a0a;
            color: #f87171;
        }

        /* Confirm Modal CSS */
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100002;
            backdrop-filter: blur(5px);
        }

        .confirm-card {
            background: #1f2937;
            color: white;
            width: 320px;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #374151;
        }

        .confetti {
            position: fixed;
            width: 8px;
            height: 8px;
            top: -10px;
            z-index: 100005;
            border-radius: 1px;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(105vh) rotate(720deg);
            }
        }

        .stats-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f3f4f6;
            font-size: 13px;
        }
    </style>
</head>

<body oncontextmenu="return false;">
    <div id="toast">Thành công!</div>

    <div id="waitOverlay" class="overlay">
        <h3 style="letter-spacing: 2px;">ĐANG XỬ LÝ...</h3>
        <div id="count" style="font-size:100px; font-weight:800; color:var(--w); margin:20px 0;">3</div>
    </div>

    <div id="confirmOverlay" class="confirm-modal">
        <div class="confirm-card">
            <h3 id="confirmMsg" style="margin-bottom: 20px; font-size: 16px;">Xác nhận thao tác?</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn-adm" style="background:#4b5563; color:white; padding:12px;"
                    onclick="closeConfirm()">HỦY</button>
                <button class="btn-adm" id="confirmOkBtn" style="background:#ef4444; color:white; padding:12px;">ĐỒNG
                    Ý</button>
            </div>
        </div>
    </div>

    <div id="adminOverlay" class="admin-overlay" onclick="if(event.target==this) closeAdmin()">
        <div id="authBox" class="admin-card" style="width: 320px; text-align: center;">
            <h3 style="margin-bottom:15px">XÁC THỰC ADMIN</h3>
            <input type="password" id="passCode" placeholder="****" maxlength="4"
                style="text-align:center; font-size:24px; letter-spacing:10px; margin-bottom:20px;">
            <button class="btn btn-in" style="width:100%" onclick="verifyPass()">MỞ KHÓA</button>
        </div>
        <div id="adminBox" class="admin-card" style="display: none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="color:var(--s)">QUẢN TRỊ VIÊN</h3>
                <button onclick="closeAdmin()"
                    style="background:none; border:none; color:#9ca3af; cursor:pointer; font-weight:bold;">✕
                    ĐÓNG</button>
            </div>
            <div id="adminList" style="max-height:300px; overflow-y:auto; margin-bottom:20px;"></div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <button class="btn" style="background:#ef4444; color:white;" onclick="resetAll()">LÀM MỚI TUẦN</button>
                <button class="btn btn-copy" onclick="closeAdmin()">THOÁT</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="column side-p">
            <h2 style="color:var(--p); text-align:center; margin-bottom:15px;">ĐIỂM DANH</h2>
            <div id="currT" class="status-box">...</div>
            <div class="form-area">
                <label>Ca làm việc</label>
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px;">
                    <button class="shift-btn" onclick="mS(0)">SÁNG</button>
                    <button class="shift-btn" onclick="mS(1)">CHIỀU</button>
                    <button class="shift-btn" onclick="mS(2)">TỐI</button>
                </div>

                <label style="margin-top:5px;">Nhân sự</label>
                <select id="nSel" onchange="tN()">
                    <option value="Trương Nhật Tân">Trương Nhật Tân</option>
                    <option value="Phan Quốc Huy">Phan Quốc Huy</option>
                    <option value="Nguyễn Đức Khải">Nguyễn Đức Khải</option>
                    <option value="custom">-- KHÁC --</option>
                </select>
                <input type="text" id="cName" placeholder="Nhập tên..." style="display:none; margin-top:5px;">

                <label style="margin-top:5px;">Nội dung Task</label>
                <input type="text" id="tIn" placeholder="Hôm nay làm gì?">

                <label style="margin-top:5px;">Kết quả đạt được</label>
                <textarea id="rIn" placeholder="Kết quả cụ thể..."></textarea>

                <div class="proof-section">
                    <label>Link Proof</label>
                    <div id="pCont" class="proof-scroll">
                        <div class="proof-item"><input type="text" class="p-url" placeholder="Link 1..." oninput="uU()">
                        </div>
                    </div>
                    <button class="btn-add-link" onclick="aP()">+ THÊM LINK</button>
                </div>
            </div>

            <div class="btn-group">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                    <button id="bIn" class="btn btn-in" onclick="sM('check in')">CHECK IN</button>
                    <button id="bOut" class="btn btn-out" onclick="sM('check out')">CHECK OUT</button>
                </div>
                <button id="bSave" class="btn btn-copy" onclick="cT()">SAO CHÉP & LƯU GIỜ</button>
            </div>
        </div>

        <div class="column output-side">
            <div id="preview"></div>
        </div>

        <div class="column side-p">
            <h3 style="font-size:12px; border-bottom:2px solid #f3f4f6; padding-bottom:10px;">TỔNG GIỜ TUẦN</h3>
            <div id="sList" style="flex:1; overflow-y:auto; margin-top:10px;"></div>
            <div style="font-size:10px; color:#9ca3af; margin-top:auto;">Hệ thống tự động lưu cục bộ (Local).</div>
        </div>
    </div>

    <script>
        let mode = '', isM = false, sIdx = -1;
        let db = JSON.parse(localStorage.getItem('workData_v16')) || {};
        const shifts = [{ n: "8:00-11:30", d: 3.5 }, { n: "14:00-17:00", d: 3.0 }, { n: "22:00-24:00", d: 2.0 }];

        // --- Custom Dialog Logic ---
        let confirmCallback = null;
        function askConfirm(msg, cb) {
            document.getElementById('confirmMsg').innerText = msg;
            document.getElementById('confirmOverlay').style.display = 'flex';
            confirmCallback = cb;
        }
        function closeConfirm() { document.getElementById('confirmOverlay').style.display = 'none'; }
        document.getElementById('confirmOkBtn').onclick = () => { confirmCallback(); closeConfirm(); };

        function showToast(m, c = '#10b981') {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.background = c; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2500);
        }

        function launchConfetti() {
            for (let i = 0; i < 60; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.backgroundColor = ['#4361ee', '#10b981', '#f59e0b', '#ef4444', '#ffffff'][Math.floor(Math.random() * 5)];
                c.style.animationDuration = (Math.random() * 2 + 2) + 's';
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 4000);
            }
        }

        function rS() {
            const l = document.getElementById('sList');
            l.innerHTML = '';
            Object.entries(db).sort().forEach(([u, h]) => {
                l.innerHTML += `<div class="stats-item"><span>${u}</span><b style="color:var(--s)">${h.toFixed(1)}h</b></div>`;
            });
        }

        function uU() {
            const now = new Date();
            const h = now.getHours() + now.getMinutes() / 60;
            const s = isM ? shifts[sIdx] : (h >= 7 && h <= 12.5 ? shifts[0] : h >= 13 && h <= 18.5 ? shifts[1] : shifts[2]);

            document.getElementById('currT').innerText = `GIỜ: ${now.toLocaleTimeString('vi-VN')} | CA: ${s.n}`;

            const idx = shifts.indexOf(s);
            document.querySelectorAll('.shift-btn').forEach((b, i) => b.classList.toggle('active', i === idx));

            if (!mode) mode = ((h >= 11 && h <= 12.5) || (h >= 16.5 && h <= 18.5) || (h >= 23.5 || h <= 1.5)) ? 'check out' : 'check in';

            document.getElementById('bIn').classList.toggle('active-mode', mode === 'check in');
            document.getElementById('bOut').classList.toggle('active-mode', mode === 'check out');

            const n = document.getElementById('nSel').value === 'custom' ? document.getElementById('cName').value : document.getElementById('nSel').value;
            const d = now.toLocaleDateString('en-GB');
            const tk = document.getElementById('tIn').value;
            const rs = document.getElementById('rIn').value;
            const lks = Array.from(document.querySelectorAll('.p-url')).map(i => i.value.trim()).filter(v => v !== '').join('\n');

            if (mode === 'check in') {
                document.getElementById('preview').innerText = `${n}- check in ${s.n} ${d}`;
            } else {
                document.getElementById('preview').innerText = `${n}- check out ${s.n} ${d}
Task: ${tk}
Kết quả: ${rs}

+ 6/ Ecosystems Outliers: TỰ tìm Outliers trong Ecosystems của TtsVol  Liên Tục REALTIME 24/7 mở MỚI/NEW HÀNG NGÀN X000s iSSale services
+ 7/ iHugeRevenue: đụng đến iHugeFreeEcosystemMoneyEvent GÌ ntn đâu vs Stakeholders đã chống sẵn
+ 8/ 30p+: TỰ có trách nhiệm cho 30p+ để hỗ trợ CHUNG  Liên Tục REALTIME 24/7 mở MỚI/NEW HÀNG NGÀN X000s iSSale services
+ 9/ iHugeImprove: hơn so với KẾT NỐI/KẾ THỪA/BOT Hóa ntn đâu
+ 10/ Tránh Lỗi
Link proof:
${lks}`;
            }
        }

        function cT() {
            navigator.clipboard.writeText(document.getElementById('preview').innerText).then(() => {
                if (mode === 'check out') {
                    const n = document.getElementById('nSel').value === 'custom' ? document.getElementById('cName').value : document.getElementById('nSel').value;
                    if (n && n.trim() !== '') {
                        const h = new Date().getHours() + new Date().getMinutes() / 60;
                        const s = isM ? shifts[sIdx] : (h >= 7 && h <= 12.5 ? shifts[0] : h >= 13 && h <= 18.5 ? shifts[1] : shifts[2]);
                        db[n] = (db[n] || 0) + s.d; save();
                    }
                    document.getElementById('bSave').disabled = true;
                    document.getElementById('waitOverlay').style.display = 'flex';
                    let tl = 3; document.getElementById('count').innerText = tl;
                    const tm = setInterval(() => {
                        tl--; document.getElementById('count').innerText = tl;
                        if (tl <= 0) {
                            clearInterval(tm);
                            document.getElementById('waitOverlay').style.display = 'none';
                            document.getElementById('tIn').value = ""; document.getElementById('rIn').value = "";
                            document.getElementById('pCont').innerHTML = '<div class="proof-item"><input type="text" class="p-url" placeholder="Link 1..." oninput="uU()"></div>';
                            document.getElementById('bSave').disabled = false;
                            mode = 'check in'; uU(); launchConfetti(); showToast("Đã lưu giờ & Chúc mừng bạn hoàn thành ca!");
                        }
                    }, 1000);
                } else { showToast("Đã copy Check-in thành công!"); launchConfetti(); }
            });
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'F12') {
                e.preventDefault();
                document.getElementById('adminOverlay').style.display = 'flex';
                document.getElementById('authBox').style.display = 'block';
                document.getElementById('adminBox').style.display = 'none';
                document.getElementById('passCode').value = ''; document.getElementById('passCode').focus();
            }
        });

        function verifyPass() {
            if (document.getElementById('passCode').value === '2003') {
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('adminBox').style.display = 'block'; loadAdmin();
            } else { showToast("Mã xác thực không đúng!", "#ef4444"); }
        }

        function loadAdmin() {
            const list = document.getElementById('adminList'); list.innerHTML = '';
            const h = new Date().getHours() + new Date().getMinutes() / 60;
            const currentShift = (h >= 7 && h <= 12.5 ? shifts[0] : h >= 13 && h <= 18.5 ? shifts[1] : shifts[2]);
            Object.entries(db).forEach(([name, hours]) => {
                const div = document.createElement('div'); div.className = 'admin-item';
                div.innerHTML = `<span>${name}: <b>${hours.toFixed(1)}h</b></span>
                    <div>
                        <button class="btn-adm btn-minus" onclick="adjTime('${name}', -${currentShift.d})">-${currentShift.d}h</button>
                        <button class="btn-adm btn-del-user" onclick="askConfirm('Xóa giờ của ${name}?', () => { delete db['${name}']; save(); loadAdmin(); showToast('Đã xóa nhân sự.'); })">XÓA</button>
                    </div>`;
                list.appendChild(div);
            });
        }

        function adjTime(n, v) { db[n] = Math.max(0, db[n] + v); save(); loadAdmin(); showToast("Đã điều chỉnh giờ."); }
        function resetAll() { askConfirm("Làm mới toàn bộ dữ liệu tuần?", () => { db = {}; save(); closeAdmin(); showToast("Đã Reset dữ liệu tuần."); }); }
        function save() { localStorage.setItem('workData_v16', JSON.stringify(db)); rS(); }
        function closeAdmin() { document.getElementById('adminOverlay').style.display = 'none'; }
        function tN() { document.getElementById('cName').style.display = (document.getElementById('nSel').value === 'custom' ? 'block' : 'none'); uU(); }
        function mS(i) { isM = true; sIdx = i; uU(); }
        function sM(m) { mode = m; uU(); }
        function aP() {
            const pc = document.getElementById('pCont'); const d = document.createElement('div'); d.className = 'proof-item';
            d.innerHTML = '<input type="text" class="p-url" placeholder="Link..." oninput="uU()"><button class="btn-del" onclick="this.parentElement.remove(); uU();">✕</button>';
            pc.appendChild(d); pc.scrollTop = pc.scrollHeight; uU();
        }

        rS(); setInterval(uU, 1000);
        ['nSel', 'cName', 'tIn', 'rIn'].forEach(id => document.getElementById(id).addEventListener('input', uU));
        document.getElementById('passCode').onkeypress = (e) => { if (e.key === 'Enter') verifyPass(); };

        document.querySelectorAll('input').forEach(input => {
            input.setAttribute('autocomplete', 'off');
        });
    </script>
</body>

</html>
