<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Điểm Danh</title>
    <link rel="icon" href="logo.png?v=2" type="image/png" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --success: #10b981;
            --warning: #f59e0b;
            --bg: #f3f4f6;
            --dark: #1f2937;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: hidden;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 1150px;
            height: 92vh;
            max-height: 750px;
            display: grid;
            grid-template-columns: 400px 1fr;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        /* --- Side Trái: Form --- */
        .input-side {
            padding: 20px;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 100%;
            overflow-y: auto;
            /* Cho phép cuộn form trên màn hình cực nhỏ */
        }

        h2 {
            font-size: 1.1rem;
            color: var(--primary);
            text-align: center;
            margin-bottom: 2px;
        }

        .status-box {
            background: #f1f5ff;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--primary);
            border: 1px solid #dbeafe;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #4b5563;
        }

        select,
        input,
        textarea {
            padding: 8px 12px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            transition: 0.2s;
            background: #fff;
        }

        select:focus,
        input:focus,
        textarea:focus {
            border-color: var(--primary);
        }

        textarea {
            height: 70px;
            resize: none;
        }

        /* --- Vùng cuộn Link Proof --- */
        .proof-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100px;
            max-height: 150px;
        }

        .proof-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 2px 5px 2px 0;
        }

        .proof-item {
            display: flex;
            gap: 6px;
        }

        .proof-item input {
            flex: 1;
        }

        .btn-remove {
            background: #fee2e2;
            color: #ef4444;
            border: none;
            padding: 0 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-add {
            background: #f8fafc;
            color: var(--primary);
            border: 1px dashed var(--primary);
            padding: 6px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            margin-top: 6px;
        }

        /* --- Buttons --- */
        .btn-action-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: auto;
            padding-top: 10px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .btn-in {
            background: var(--success);
            color: white;
        }

        .btn-out {
            background: var(--warning);
            color: white;
        }

        .btn-copy {
            background: var(--dark);
            color: white;
            width: 100%;
        }

        .active-mode {
            box-shadow: 0 0 0 3px #000;
            transform: scale(0.98);
        }

        /* --- Side Phải: Preview --- */
        .output-side {
            background: #111827;
            padding: 25px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        #preview {
            white-space: pre-wrap;
            font-family: 'Consolas', monospace;
            font-size: 13.5px;
            line-height: 1.5;
            color: #e5e7eb;
            overflow-y: auto;
            height: 100%;
        }

        /* --- TOAST --- */
        #toast {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: var(--success);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
            transform: translateY(150px);
            transition: 0.3s;
            z-index: 9999;
        }

        #toast.show {
            transform: translateY(0);
        }

        /* --- RESPONSIVE: ĐIỆN THOẠI --- */
        @media (max-width: 850px) {
            body {
                overflow-y: auto;
                height: auto;
                padding: 10px;
            }

            .container {
                grid-template-columns: 1fr;
                /* Chuyển thành 1 cột */
                height: auto;
                max-height: none;
                display: block;
            }

            .input-side {
                border-right: none;
                border-bottom: 1px solid #e5e7eb;
                height: auto;
                overflow: visible;
            }

            .output-side {
                height: 400px;
                /* Cố định chiều cao preview trên mobile */
            }

            .proof-wrapper {
                max-height: none;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div id="toast">Đã sao chép thành công!</div>

    <div class="container">
        <div class="input-side">
            <h2>ĐIỂM DANH</h2>
            <div id="currentTime" class="status-box">...</div>

            <div class="field-group">
                <label>Nhân sự</label>
                <select id="nameSelect" onchange="toggleCustomName()">
                    <option value="Trương Nhật Tân">Trương Nhật Tân</option>
                    <option value="Phan Quốc Huy">Phan Quốc Huy</option>
                    <option value="Nguyễn Đức Khải">Nguyễn Đức Khải</option>
                </select>
                <input type="text" id="customName" placeholder="Gõ tên..." style="display:none; margin-top:5px;">
            </div>

            <div class="field-group">
                <label>Task công việc</label>
                <input type="text" id="taskInput" placeholder="Nội dung task...">
            </div>

            <div class="field-group">
                <label>Kết quả chi tiết</label>
                <textarea id="resultInput" placeholder="Kết quả đạt được..."></textarea>
            </div>

            <div class="proof-wrapper">
                <label>Link Proof</label>
                <div id="proofContainer" class="proof-list">
                    <div class="proof-item">
                        <input type="text" class="proof-url" placeholder="Dán link 1..." oninput="updateUI()">
                    </div>
                </div>
                <div class="btn-add" onclick="addProofField()">+ Thêm link mới</div>
            </div>

            <div class="btn-action-group">
                <div class="row">
                    <button id="btnIn" class="btn btn-in" onclick="setMode('check in')">CHECK IN</button>
                    <button id="btnOut" class="btn btn-out" onclick="setMode('check out')">CHECK OUT</button>
                </div>
                <button class="btn btn-copy" onclick="copyText()">SAO CHÉP KẾT QUẢ</button>
            </div>
        </div>

        <div class="output-side">
            <div id="preview"></div>
        </div>
    </div>

    <script>
        let currentMode = '';
        const shifts = [
            { name: "8:00-11:30", start: 8, end: 11.5 },
            { name: "14:00-17:00", start: 14, end: 17 },
            { name: "22:00-24:00", start: 22, end: 24 }
        ];

        function addProofField() {
            const container = document.getElementById('proofContainer');
            const div = document.createElement('div');
            div.className = 'proof-item';
            div.innerHTML = `<input type="text" class="proof-url" placeholder="Link..." oninput="updateUI()">
                             <button class="btn-remove" onclick="this.parentElement.remove(); updateUI();">✕</button>`;
            container.appendChild(div);
            updateUI();
        }

        function getShift() {
            const now = new Date();
            const time = now.getHours() + now.getMinutes() / 60;
            if (time >= 7 && time <= 12.5) return shifts[0];
            if (time >= 13 && time <= 18.5) return shifts[1];
            if (time >= 21 || time <= 1.5) return shifts[2];
            return shifts[1];
        }

        function updateUI() {
            const s = getShift();
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-GB');
            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;

            document.getElementById('currentTime').innerText = `Giờ: ${timeStr} | Ca: ${s.name}`;

            const name = (document.getElementById('nameSelect').value === 'custom')
                ? document.getElementById('customName').value : document.getElementById('nameSelect').value;

            if (currentMode === 'check in') {
                document.getElementById('preview').innerText = `${name}- check in ${s.name.replace('-', ' ')} ${dateStr}`;
            } else {
                const task = document.getElementById('taskInput').value;
                const result = document.getElementById('resultInput').value;
                const links = Array.from(document.querySelectorAll('.proof-url')).map(i => i.value.trim()).filter(v => v !== '').join('\n');

                document.getElementById('preview').innerText = `${name}- check out ${s.name.replace('-', ' ')} ${dateStr}
Task: ${task}
Kết quả: ${result}

+ 6/ Ecosystems Outliers: TỰ tìm Outliers trong Ecosystems của TtsVol  Liên Tục REALTIME 24/7 mở MỚI/NEW HÀNG NGÀN X000s iSSale services
+ 7/ iHugeRevenue: đụng đến iHugeFreeEcosystemMoneyEvent GÌ ntn đâu vs Stakeholders đã chống sẵn
+ 8/ 30p+: TỰ có trách nhiệm cho 30p+ để hỗ trợ CHUNG  Liên Tục REALTIME 24/7 mở MỚI/NEW HÀNG NGÀN X000s iSSale services
+ 9/ iHugeImprove: hơn so với KẾT NỐI/KẾ THỪA/BOT Hóa ntn đâu
+ 10/ Tránh Lỗi
Link proof:
${links}`;
            }
        }

        function setMode(m) {
            currentMode = m;
            document.getElementById('btnIn').classList.toggle('active-mode', m === 'check in');
            document.getElementById('btnOut').classList.toggle('active-mode', m === 'check out');
            if (m === 'check in') {
                document.getElementById('taskInput').value = '';
                document.getElementById('resultInput').value = '';
                document.querySelectorAll('.proof-url').forEach((el, index) => index === 0 ? el.value = '' : el.parentElement.remove());
            }
            updateUI();
        }

        function toggleCustomName() {
            const isCustom = document.getElementById('nameSelect').value === 'custom';
            document.getElementById('customName').style.display = isCustom ? 'block' : 'none';
            updateUI();
        }

        function copyText() {
            navigator.clipboard.writeText(document.getElementById('preview').innerText).then(() => {
                const t = document.getElementById('toast');
                t.classList.add('show');
                setTimeout(() => t.classList.remove('show'), 2000);
            });
        }

        ['taskInput', 'resultInput', 'customName'].forEach(id => document.getElementById(id).addEventListener('input', updateUI));

        const h = new Date().getHours() + new Date().getMinutes() / 60;
        setMode(((h >= 10.5 && h <= 12.5) || (h >= 16 && h <= 18.5) || (h >= 23 || h <= 1.5)) ? 'check out' : 'check in');

        setInterval(updateUI, 1000);
    </script>
</body>

</html>
